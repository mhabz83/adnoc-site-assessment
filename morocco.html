<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morocco — Aftermarket Site Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="auth.js"></script>
<script src="morocco-data.js"></script>
<script src="morocco-competitors.js"></script>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="index.html" class="topnav-back">← Dashboard</a>
  </div>
  <div class="topnav-center">
    <span class="topnav-flag">🇲🇦</span>
    <span class="topnav-title">Morocco Site Assessment</span>
  </div>
  <div class="topnav-right">WAG</div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title">Morocco</h1>
      <p class="sidebar-subtitle">Petrom & Petromin partner network</p>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="partner-toggle" id="partnerToggle">
      <button class="partner-btn active" data-partner="all">All</button>
      <button class="partner-btn" data-partner="Petrom">Petrom</button>
      <button class="partner-btn" data-partner="Petromin">Petromin</button>
    </div>

    <div class="filter-section">
      <div class="filter-group" id="filterGroup"></div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search sites..." class="search-input">
    </div>

    <div class="competition-toggle">
      <label class="toggle-label">
        <input type="checkbox" id="competitionToggle">
        <span class="toggle-text">Show competition</span>
      </label>
    </div>

    <div class="site-list" id="siteList"></div>

    <div class="sidebar-footer">
      <span class="footer-text">34 sites · WAG Aftermarket</span>
    </div>
  </aside>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-legend" id="mapLegend">
      <div class="legend-title">Grade</div>
      <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Prime</div>
      <div class="legend-item"><span class="legend-dot" style="background:#eab308"></span> Viable</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Weak</div>
    </div>
  </div>
</div>

<script>
(function() {
  const GRADE_COLORS = { green: '#22c55e', yellow: '#eab308', red: '#ef4444' };
  const GRADE_LABELS = { green: 'Prime', yellow: 'Viable', red: 'Weak' };
  const CRITERIA_LABELS = ['Traffic', 'Location', 'Access', 'Space', 'Low Compet.', 'Demand'];
  const CRITERIA_KEYS = ['traffic', 'location', 'access', 'space', 'competition', 'demand'];

  // Flatten data
  const ALL_SITES = [...(MOROCCO_DATA.petrom || []), ...(MOROCCO_DATA.petromin || [])];

  // State
  let activeFilters = {};
  let activePartner = 'all';
  let searchQuery = '';
  let showCompetition = false;
  let markers = [];
  let competitionCircles = [];
  let selectedSite = null;

  // Init map
  const map = L.map('map', { zoomControl: true }).setView([33.3, -7.5], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Stats
  function renderStats() {
    const prime = ALL_SITES.filter(s => s.grade === 'green').length;
    const viable = ALL_SITES.filter(s => s.grade === 'yellow').length;
    const weak = ALL_SITES.filter(s => s.grade === 'red').length;
    const assessed = ALL_SITES.filter(s => s.status === 'Assessed').length;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-badge stat-green"><span class="stat-val">${prime}</span><span class="stat-lbl">Prime</span></div>
      <div class="stat-badge stat-yellow"><span class="stat-val">${viable}</span><span class="stat-lbl">Viable</span></div>
      <div class="stat-badge stat-red"><span class="stat-val">${weak}</span><span class="stat-lbl">Weak</span></div>
      <div class="stat-badge stat-blue"><span class="stat-val">${assessed}</span><span class="stat-lbl">Assessed</span></div>
    `;
  }

  // Partner toggle
  document.getElementById('partnerToggle').addEventListener('click', function(e) {
    const btn = e.target.closest('.partner-btn');
    if (!btn) return;
    document.querySelectorAll('.partner-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePartner = btn.dataset.partner;
    updateView();
  });

  // Filters
  const FILTER_GROUPS = [
    { label: 'Grade', filters: [
      { key: 'grade', value: 'green', label: 'Prime' },
      { key: 'grade', value: 'yellow', label: 'Viable' },
      { key: 'grade', value: 'red', label: 'Weak' }
    ]},
    { label: 'Status', filters: [
      { key: 'status', value: 'Assessed', label: 'Assessed' },
      { key: 'status', value: 'Desktop Research', label: 'Desktop Only' }
    ]}
  ];

  function renderFilters() {
    let html = '<button class="filter-btn filter-all active" data-action="all">All</button>';
    FILTER_GROUPS.forEach(group => {
      html += `<span class="filter-divider"></span>`;
      group.filters.forEach(f => {
        const isActive = activeFilters[f.key] && activeFilters[f.key].includes(f.value);
        html += `<button class="filter-btn${isActive ? ' active' : ''}" data-key="${f.key}" data-value="${f.value}">${f.label}</button>`;
      });
    });
    document.getElementById('filterGroup').innerHTML = html;
    const hasAny = Object.keys(activeFilters).some(k => activeFilters[k].length > 0);
    const allBtn = document.querySelector('.filter-all');
    if (allBtn) allBtn.classList.toggle('active', !hasAny);
  }

  document.getElementById('filterGroup').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    if (btn.dataset.action === 'all') {
      activeFilters = {};
    } else {
      const key = btn.dataset.key;
      const val = btn.dataset.value;
      if (!activeFilters[key]) activeFilters[key] = [];
      const idx = activeFilters[key].indexOf(val);
      if (idx >= 0) activeFilters[key].splice(idx, 1);
      else activeFilters[key].push(val);
      if (activeFilters[key].length === 0) delete activeFilters[key];
    }
    renderFilters();
    updateView();
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value.toLowerCase();
    updateView();
  });

  // Competition toggle
  document.getElementById('competitionToggle').addEventListener('change', function(e) {
    showCompetition = e.target.checked;
    updateCompetition();
  });

  function filterSite(site) {
    // Partner
    if (activePartner !== 'all' && site.partner !== activePartner) return false;
    // Search
    if (searchQuery) {
      const hay = `${site.code} ${site.name} ${site.area} ${site.city} ${site.partner}`.toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    // Filters
    for (const key of Object.keys(activeFilters)) {
      if (activeFilters[key].length === 0) continue;
      if (key === 'grade') {
        if (!activeFilters[key].includes(site.grade)) return false;
      } else if (key === 'status') {
        if (!activeFilters[key].includes(site.status)) return false;
      }
    }
    return true;
  }

  function getFiltered() {
    return ALL_SITES.filter(filterSite).sort((a, b) => (b.weighted_score || 0) - (a.weighted_score || 0));
  }

  // Sidebar list
  function renderList(sites) {
    const list = document.getElementById('siteList');
    if (sites.length === 0) {
      list.innerHTML = '<div class="list-empty">No sites match filters</div>';
      return;
    }
    list.innerHTML = sites.map(s => {
      const gc = GRADE_COLORS[s.grade] || '#64748b';
      const score = s.weighted_score || (s.derived_scores && s.derived_scores.weighted_score) || 0;
      const isSelected = selectedSite && selectedSite.code === s.code;
      return `<div class="site-item${isSelected ? ' selected' : ''}" data-code="${s.code}">
        <div class="site-item-top">
          <span class="grade-dot" style="background:${gc}"></span>
          <span class="site-code">${s.code}</span>
          <span class="site-name-text">${escapeHTML(s.name)}</span>
          <span class="badge badge-partner">${s.partner}</span>
          <span class="site-score" style="color:${gc}">${score.toFixed(1)}</span>
        </div>
        <div class="site-item-sub">${escapeHTML(s.city)} · ${escapeHTML(s.area)}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('siteList').addEventListener('click', function(e) {
    const item = e.target.closest('.site-item');
    if (!item) return;
    const code = item.dataset.code;
    const site = ALL_SITES.find(s => s.code === code);
    if (site) openPopup(site);
  });

  // Map markers
  function renderMarkers(sites) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    sites.forEach(s => {
      const gc = GRADE_COLORS[s.grade] || '#64748b';
      const marker = L.circleMarker([s.lat, s.lng], {
        radius: 6,
        fillColor: gc,
        fillOpacity: 0.85,
        color: 'rgba(0,0,0,0.3)',
        weight: 1
      }).addTo(map);
      marker.on('click', () => openPopup(s));
      markers.push(marker);
    });
  }

  function updateCompetition() {
    competitionCircles.forEach(c => map.removeLayer(c));
    competitionCircles = [];
    if (!showCompetition) return;
    const filtered = getFiltered();
    filtered.forEach(s => {
      const level = COMPETITION_DATA[s.code];
      if (!level) return;
      const colors = { 1: '#22c55e', 2: '#eab308', 3: '#ef4444' };
      const radii = { 1: 600, 2: 900, 3: 1200 };
      const circle = L.circle([s.lat, s.lng], {
        radius: radii[level] || 800,
        fillColor: colors[level] || '#eab308',
        fillOpacity: 0.08,
        color: colors[level] || '#eab308',
        weight: 1,
        opacity: 0.3
      }).addTo(map);
      competitionCircles.push(circle);
    });
  }

  // Popup
  function openPopup(site) {
    selectedSite = site;
    renderList(getFiltered());
    map.setView([site.lat, site.lng], 14);
    map.closePopup();

    const gc = GRADE_COLORS[site.grade] || '#64748b';
    const gradeLabel = GRADE_LABELS[site.grade] || site.grade;
    const score = site.weighted_score || (site.derived_scores && site.derived_scores.weighted_score) || 0;
    const scores = site.derived_scores || {};

    // Info tags
    let tags = '';
    if (site.visit_date) tags += `<span class="popup-tag tag-visit">Visited ${site.visit_date}</span>`;
    if (site.photos_url) tags += `<a href="${site.photos_url}" target="_blank" class="popup-tag tag-photos">📷 Photos</a>`;
    if (site.satellite_url) tags += `<a href="${site.satellite_url}" target="_blank" class="popup-tag tag-sat">🛰 Satellite</a>`;

    // Criteria grid
    let criteriaHTML = '<div class="criteria-grid">';
    CRITERIA_KEYS.forEach((key, i) => {
      const val = scores[key] || 0;
      const pct = val * 10;
      const barColor = val >= 7 ? '#22c55e' : val >= 5 ? '#eab308' : '#ef4444';
      criteriaHTML += `<div class="criteria-item">
        <span class="criteria-label">${CRITERIA_LABELS[i]}</span>
        <div class="criteria-bar-wrap">
          <div class="criteria-bar" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <span class="criteria-val" style="color:${barColor}">${val}</span>
      </div>`;
    });
    criteriaHTML += '</div>';

    // Key insight
    let insightHTML = '';
    if (site.recommendation_rationale) {
      insightHTML = `<div class="popup-insight">${escapeHTML(site.recommendation_rationale)}</div>`;
    }

    // Expandable sections
    let sections = '';
    sections += makeSection('Market Intelligence', site.population_data || 'Data pending');
    sections += makeSection('Competitor Analysis', site.competitors || 'Data pending');
    sections += makeSection('Traffic & Access', site.traffic_data || 'Data pending');
    sections += makeSection('Infrastructure Projects', site.infrastructure || 'Data pending');
    sections += makeSection('Commercial Context', site.commercial || 'Data pending');
    sections += makeSection('Fleet Potential', site.transport || 'Data pending');
    if (site.facilities) {
      sections += makeSection('Facilities On-Site', site.facilities);
    }

    const popupContent = `
      <div class="site-popup">
        <div class="popup-header">
          <span class="grade-dot-lg" style="background:${gc}"></span>
          <div class="popup-header-text">
            <div class="popup-name">${escapeHTML(site.code)} ${escapeHTML(site.name)}</div>
            <div class="popup-sub">${escapeHTML(site.city)} · ${escapeHTML(site.area)} · ${escapeHTML(site.partner)}</div>
          </div>
          <span class="popup-score" style="color:${gc}">${score.toFixed(1)}</span>
        </div>
        ${tags ? `<div class="popup-tags">${tags}</div>` : ''}
        ${criteriaHTML}
        ${insightHTML}
        <div class="popup-sections">${sections}</div>
      </div>
    `;

    const popup = L.popup({
      maxWidth: 420,
      minWidth: 380,
      className: 'custom-popup'
    }).setLatLng([site.lat, site.lng]).setContent(popupContent).openOn(map);

    setTimeout(() => {
      document.querySelectorAll('.section-header').forEach(h => {
        h.addEventListener('click', function() {
          this.classList.toggle('expanded');
          this.nextElementSibling.classList.toggle('show');
        });
      });
    }, 50);
  }

  function makeSection(title, content) {
    const safe = escapeHTML(content || 'Data pending').replace(/\n/g, '<br>');
    return `<div class="popup-section">
      <div class="section-header">▶ ${escapeHTML(title)}</div>
      <div class="section-body">${safe}</div>
    </div>`;
  }

  function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateView() {
    const filtered = getFiltered();
    renderList(filtered);
    renderMarkers(filtered);
    updateCompetition();
  }

  // Init
  renderStats();
  renderFilters();
  updateView();
})();
</script>
</body>
</html>
