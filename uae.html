<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAE — Aftermarket Site Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="auth.js"></script>
<script src="uae-data.js"></script>
<script src="uae-competitors.js"></script>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <a href="index.html" class="topnav-back">← Dashboard</a>
  </div>
  <div class="topnav-center">
    <span class="topnav-flag">🇦🇪</span>
    <span class="topnav-title">UAE Site Assessment</span>
  </div>
  <div class="topnav-right">WAG</div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="sidebar-title">United Arab Emirates</h1>
      <p class="sidebar-subtitle">Aftermarket network expansion</p>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="filter-section">
      <div class="filter-group" id="filterGroup">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search sites..." class="search-input">
    </div>

    <div class="competition-toggle">
      <label class="toggle-label">
        <input type="checkbox" id="competitionToggle">
        <span class="toggle-text">Show competition</span>
      </label>
    </div>

    <div class="site-list" id="siteList"></div>

    <div class="sidebar-footer">
      <span class="footer-text">209 sites · WAG Aftermarket</span>
    </div>
  </aside>

  <!-- MAP -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-legend" id="mapLegend">
      <div class="legend-title">Grade</div>
      <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span> Green</div>
      <div class="legend-item"><span class="legend-dot" style="background:#eab308"></span> Yellow</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span> Red</div>
    </div>
  </div>
</div>

<script>
(function() {
  const GRADE_COLORS = { green: '#22c55e', yellow: '#eab308', red: '#ef4444' };
  const CRITERIA_LABELS = ['Traffic', 'Fuel Nearby', 'Car Wash', 'Affluence', 'EV Signals', 'Low Compet.'];
  const CRITERIA_KEYS = ['traffic', 'fuel_retailers', 'car_wash', 'affluent', 'ev_signals', 'competitor'];

  // State
  let activeFilters = {};
  let searchQuery = '';
  let showCompetition = false;
  let markers = [];
  let competitionCircles = [];
  let selectedSite = null;

  // Init map
  const map = L.map('map', { zoomControl: true }).setView([24.5, 54.5], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Stats
  function renderStats() {
    const confirmed = SITES_DATA.filter(s => s.confirmed).length;
    const green = SITES_DATA.filter(s => s.grade === 'green').length;
    const yellow = SITES_DATA.filter(s => s.grade === 'yellow').length;
    const red = SITES_DATA.filter(s => s.grade === 'red').length;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-badge stat-blue"><span class="stat-val">${confirmed}</span><span class="stat-lbl">Confirmed</span></div>
      <div class="stat-badge stat-green"><span class="stat-val">${green}</span><span class="stat-lbl">Green</span></div>
      <div class="stat-badge stat-yellow"><span class="stat-val">${yellow}</span><span class="stat-lbl">Yellow</span></div>
      <div class="stat-badge stat-red"><span class="stat-val">${red}</span><span class="stat-lbl">Red</span></div>
    `;
  }

  // Filters
  const FILTER_GROUPS = [
    { label: 'Status', filters: [
      { key: 'status', value: 'confirmed', label: 'Confirmed' },
      { key: 'status', value: 'assessed', label: 'Assessed' }
    ]},
    { label: 'Year', filters: [
      { key: 'year', value: 'Y1', label: 'Y1' },
      { key: 'year', value: 'Y2', label: 'Y2' },
      { key: 'year', value: 'Y3', label: 'Y3' },
      { key: 'year', value: 'Y4', label: 'Y4' },
      { key: 'year', value: 'Y5', label: 'Y5' },
      { key: 'year', value: 'Y6', label: 'Y6' }
    ]},
    { label: 'Grade', filters: [
      { key: 'grade', value: 'green', label: 'Green' },
      { key: 'grade', value: 'yellow', label: 'Yellow' },
      { key: 'grade', value: 'red', label: 'Red' }
    ]},
    { label: 'Emirate', filters: [
      { key: 'emirate', value: 'Abu Dhabi', label: 'Abu Dhabi' },
      { key: 'emirate', value: 'Dubai', label: 'Dubai' },
      { key: 'emirate', value: 'Sharjah', label: 'Sharjah' }
    ]},
    { label: 'Bays', filters: [
      { key: 'archetype', value: '2-bays', label: '2 Bays' },
      { key: 'archetype', value: '3-4 bays', label: '3-4 Bays' },
      { key: 'archetype', value: '5+ bays', label: '5+ Bays' }
    ]}
  ];

  function renderFilters() {
    let html = '<button class="filter-btn filter-all active" data-action="all">All</button>';
    FILTER_GROUPS.forEach(group => {
      html += `<span class="filter-divider"></span>`;
      group.filters.forEach(f => {
        const isActive = activeFilters[f.key] && activeFilters[f.key].includes(f.value);
        html += `<button class="filter-btn${isActive ? ' active' : ''}" data-key="${f.key}" data-value="${f.value}">${f.label}</button>`;
      });
    });
    document.getElementById('filterGroup').innerHTML = html;

    // Update All button state
    const hasAny = Object.keys(activeFilters).some(k => activeFilters[k].length > 0);
    const allBtn = document.querySelector('.filter-all');
    if (allBtn) allBtn.classList.toggle('active', !hasAny);
  }

  document.getElementById('filterGroup').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    if (btn.dataset.action === 'all') {
      activeFilters = {};
    } else {
      const key = btn.dataset.key;
      const val = btn.dataset.value;
      if (!activeFilters[key]) activeFilters[key] = [];
      const idx = activeFilters[key].indexOf(val);
      if (idx >= 0) activeFilters[key].splice(idx, 1);
      else activeFilters[key].push(val);
      if (activeFilters[key].length === 0) delete activeFilters[key];
    }
    renderFilters();
    updateView();
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value.toLowerCase();
    updateView();
  });

  // Competition toggle
  document.getElementById('competitionToggle').addEventListener('change', function(e) {
    showCompetition = e.target.checked;
    updateCompetition();
  });

  function filterSite(site) {
    // Search
    if (searchQuery) {
      const hay = `${site.ss} ${site.name} ${site.area} ${site.emirate}`.toLowerCase();
      if (!hay.includes(searchQuery)) return false;
    }
    // Filters: AND across categories, OR within category
    for (const key of Object.keys(activeFilters)) {
      if (activeFilters[key].length === 0) continue;
      if (key === 'status') {
        const match = activeFilters[key].some(v => {
          if (v === 'confirmed') return site.confirmed === true;
          if (v === 'assessed') return site.assessed === true;
          return false;
        });
        if (!match) return false;
      } else if (key === 'year') {
        if (!activeFilters[key].includes(site.year_label)) return false;
      } else if (key === 'grade') {
        if (!activeFilters[key].includes(site.grade)) return false;
      } else if (key === 'emirate') {
        if (!activeFilters[key].includes(site.emirate)) return false;
      } else if (key === 'archetype') {
        if (!activeFilters[key].includes(site.archetype)) return false;
      }
    }
    return true;
  }

  function getFiltered() {
    return SITES_DATA.filter(filterSite).sort((a, b) => b.weighted_score - a.weighted_score);
  }

  // Sidebar list
  function renderList(sites) {
    const list = document.getElementById('siteList');
    if (sites.length === 0) {
      list.innerHTML = '<div class="list-empty">No sites match filters</div>';
      return;
    }
    list.innerHTML = sites.map(s => {
      const gc = GRADE_COLORS[s.grade] || '#64748b';
      const yearBadge = s.confirmed && s.year_label ? `<span class="badge badge-year">${s.year_label}</span>` : '';
      const archBadge = s.confirmed && s.archetype ? `<span class="badge badge-arch">${s.archetype}</span>` : '';
      const isSelected = selectedSite && selectedSite.ss === s.ss;
      return `<div class="site-item${isSelected ? ' selected' : ''}" data-ss="${s.ss}">
        <div class="site-item-top">
          <span class="grade-dot" style="background:${gc}"></span>
          <span class="site-code">${s.ss}</span>
          <span class="site-name-text">${s.name}</span>
          ${yearBadge}${archBadge}
          <span class="site-score" style="color:${gc}">${s.weighted_score.toFixed(1)}</span>
        </div>
        <div class="site-item-sub">${s.emirate} · ${s.area}</div>
      </div>`;
    }).join('');
  }

  document.getElementById('siteList').addEventListener('click', function(e) {
    const item = e.target.closest('.site-item');
    if (!item) return;
    const ss = item.dataset.ss;
    const site = SITES_DATA.find(s => s.ss === ss);
    if (site) openPopup(site);
  });

  // Map markers
  function renderMarkers(sites) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    sites.forEach(s => {
      const gc = GRADE_COLORS[s.grade] || '#64748b';
      const marker = L.circleMarker([s.lat, s.lng], {
        radius: 6,
        fillColor: gc,
        fillOpacity: 0.85,
        color: 'rgba(0,0,0,0.3)',
        weight: 1
      }).addTo(map);
      marker.on('click', () => openPopup(s));
      markers.push(marker);
    });
  }

  function updateCompetition() {
    competitionCircles.forEach(c => map.removeLayer(c));
    competitionCircles = [];
    if (!showCompetition) return;
    const filtered = getFiltered();
    filtered.forEach(s => {
      const level = COMPETITION_DATA[s.ss];
      if (!level) return;
      const colors = { 1: '#22c55e', 2: '#eab308', 3: '#ef4444' };
      const radii = { 1: 600, 2: 900, 3: 1200 };
      const circle = L.circle([s.lat, s.lng], {
        radius: radii[level] || 800,
        fillColor: colors[level] || '#eab308',
        fillOpacity: 0.08,
        color: colors[level] || '#eab308',
        weight: 1,
        opacity: 0.3
      }).addTo(map);
      competitionCircles.push(circle);
    });
  }

  // Popup
  function openPopup(site) {
    selectedSite = site;
    renderList(getFiltered());
    map.setView([site.lat, site.lng], 14);

    // Remove existing popup
    map.closePopup();

    const gc = GRADE_COLORS[site.grade] || '#64748b';
    const gradeLabel = site.grade.charAt(0).toUpperCase() + site.grade.slice(1);

    // Info tags
    let tags = '';
    if (site.visit_date) tags += `<span class="popup-tag tag-visit">Visited ${site.visit_date}</span>`;
    if (site.confirmed && site.year_label) tags += `<span class="popup-tag tag-year">${site.year_label} — ${site.deployment_year || ''}</span>`;
    if (site.archetype) tags += `<span class="popup-tag tag-arch">${site.archetype}</span>`;
    if (site.has_photos) tags += `<span class="popup-tag tag-photos">Photos available</span>`;
    if (site.satellite_url) tags += `<a href="${site.satellite_url}" target="_blank" class="popup-tag tag-sat">🛰 Satellite</a>`;

    // Criteria grid
    let criteriaHTML = '<div class="criteria-grid">';
    CRITERIA_KEYS.forEach((key, i) => {
      const val = site.scores[key] || 0;
      const pct = val * 10;
      const barColor = val >= 7 ? '#22c55e' : val >= 5 ? '#eab308' : '#ef4444';
      criteriaHTML += `<div class="criteria-item">
        <span class="criteria-label">${CRITERIA_LABELS[i]}</span>
        <div class="criteria-bar-wrap">
          <div class="criteria-bar" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <span class="criteria-val" style="color:${barColor}">${val}</span>
      </div>`;
    });
    criteriaHTML += '</div>';

    // Key insight
    let insightHTML = '';
    const insight = site.key_insight || site.notes;
    if (insight) {
      insightHTML = `<div class="popup-insight">${escapeHTML(insight)}</div>`;
    }

    // Expandable sections
    let sections = '';
    sections += makeSection('Market Intelligence', site.market_intel || site.notes || 'Data pending');
    sections += makeSection('Competitor Analysis', site.competitor_analysis || site.competition_notes || 'Data pending');
    sections += makeSection('Infrastructure & Access', site.infrastructure_access || 'Data pending');
    sections += makeSection('EV & Fleet', site.ev_fleet || 'Data pending');
    sections += makeSection('Commercial Context', site.commercial_context || 'Data pending');
    if (site.assessment_notes) {
      sections += makeSection('Assessment Notes', site.assessment_notes);
    }

    const popupContent = `
      <div class="site-popup">
        <div class="popup-header">
          <span class="grade-dot-lg" style="background:${gc}"></span>
          <div class="popup-header-text">
            <div class="popup-name">${site.ss} ${escapeHTML(site.name)}</div>
            <div class="popup-sub">${escapeHTML(site.emirate)} · ${escapeHTML(site.area)}${site.confirmed ? ' · Confirmed' : ''}</div>
          </div>
          <span class="popup-score" style="color:${gc}">${site.weighted_score.toFixed(1)}</span>
        </div>
        ${tags ? `<div class="popup-tags">${tags}</div>` : ''}
        ${criteriaHTML}
        ${insightHTML}
        <div class="popup-sections">${sections}</div>
      </div>
    `;

    const popup = L.popup({
      maxWidth: 420,
      minWidth: 380,
      className: 'custom-popup'
    }).setLatLng([site.lat, site.lng]).setContent(popupContent).openOn(map);

    // Bind expand/collapse
    setTimeout(() => {
      document.querySelectorAll('.section-header').forEach(h => {
        h.addEventListener('click', function() {
          this.classList.toggle('expanded');
          this.nextElementSibling.classList.toggle('show');
        });
      });
    }, 50);
  }

  function makeSection(title, content) {
    const safe = escapeHTML(content || 'Data pending').replace(/\n/g, '<br>');
    return `<div class="popup-section">
      <div class="section-header">▶ ${escapeHTML(title)}</div>
      <div class="section-body">${safe}</div>
    </div>`;
  }

  function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateView() {
    const filtered = getFiltered();
    renderList(filtered);
    renderMarkers(filtered);
    updateCompetition();
  }

  // Init
  renderStats();
  renderFilters();
  updateView();
})();
</script>
</body>
</html>
